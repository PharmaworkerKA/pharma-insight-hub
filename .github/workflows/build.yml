name: PharmaPedia Japan - Build & Deploy

on:
  schedule:
    # 毎日 JST 14:00 (UTC 5:00) - 各ブログの更新後に実行
    - cron: '0 5 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build site
        run: python build.py

      - name: Commit cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cache/
          git diff --staged --quiet || git commit -m "cache: 記事キャッシュ更新 $(date '+%Y-%m-%d')"
          git push

      - name: Inject llms.txt into site output
        if: always()
        run: |
          if [ -f static_assets/llms.txt ]; then
            mkdir -p site
            cp static_assets/llms.txt site/llms.txt
            echo "Injected static_assets/llms.txt -> site/llms.txt"
          else
            echo "No static_assets/llms.txt; skipping"
          fi

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
